name: CI/CD →  Proxmox LXC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOY_PATH: /opt/yolenolab # path on your LXC where the repo lives

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. SECRET SCAN — Gitleaks
  # ────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Gitleaks can diff all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # 2. YAML LINT — compose syntax
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint compose.yml
        run: 'yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" compose.yml'

      - name: Validate docker compose config
        run: docker compose config --quiet

  # ────────────────────────────────────────────────────────────────────────────
  # 3. IMAGE SCAN — Trivy vulnerability scan on each image in compose file
  # ────────────────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        image: [prom/prometheus:main, prom/node-exporter:master]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan ${{ matrix.image }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Upload Trivy SARIF report for ${{ matrix.image }}
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # 4. DEPLOY — SSH into LXC, git pull, docker compose up
  #    Only runs on push to main (not on PRs)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Proxmox LXC
    runs-on: ubuntu-latest
    needs: [secret-scan, lint, trivy-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production # optional: adds a manual approval gate in GitHub

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LXC_HOST }}
          username: ${{ secrets.LXC_USER }}
          key: ${{ secrets.LXC_SSH_KEY }}
          port: ${{ secrets.LXC_PORT }} # default 22 if not set
          script: |
            set -e

            echo "📦 Pulling latest changes..."
            if [ -d "{{DEPLOY_PATH}}" ]; then
              echo "Directory exists. Changing into it..."
              cd {{DEPLOY_PATH}}
            else
              echo "Directory doesn't exist. Creating and changing into it..."
              mkdir -p {{DEPLOY_PATH}}
              cd {{DEPLOY_PATH}}
            fi
            git pull origin main

            echo "🐳 Restarting updated services..."
            docker compose pull --quiet
            docker compose up -d --remove-orphans

            echo "🧹 Pruning unused images..."
            docker image prune -f

            echo "✅ Deploy complete — $(date)"
